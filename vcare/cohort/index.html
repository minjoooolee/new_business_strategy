<body>

<!-- GNB -->
<header class="gnb" id="gnb">
  <div class="gnb-inner">
    <a href="../" class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">

      </svg>
      <span class="logo-text">v.care</span>
    </a>
    <nav class="gnb-nav">
      <ul>
        <li><a href="../">홈</a></li>
        <li><a href="../feed">피드</a></li>
        <li><a href="../community">질환별 게시판</a></li>
        <li><a href="../cohort" class="active">in 코호트</a></li>
        <li><a href="#">검사결과지</a></li>
        <li><a href="#">문의</a></li>
      </ul>
    </nav>
    <div class="gnb-right">
      <a href="#" class="btn-login">로그인</a>
      <button class="hamburger" id="hamBtn" aria-label="메뉴">
        <span></span><span></span>
      </button>
    </div>
  </div>
</header>

<!-- 히어로 -->
<section class="page-hero page-hero--community">
  <div class="hero-blob"></div>
  <div class="arc arc-a"></div>
  <div class="arc arc-b"></div>
  <div class="hero-body">
    <p class="eyebrow">Same Stage. Shared Strength.</p>
    <h1 class="hero-title">
      <em>in</em> 코호트
    </h1>
    <p class="hero-desc">
      나와 같은 암종, 같은 병기, 같은 치료 단계의<br>
      환우들과 실시간으로 정보를 나누세요.
    </p>
  </div>
</section>

<!-- ── 온보딩 (처음 진입 시) ────────────────────── -->
<div class="cohort-onboarding" id="onboarding">
  <div class="onb-card">

    <!-- 스텝 인디케이터 -->
    <div class="onb-step-indicator" id="stepDots"></div>

    <!-- 스텝 콘텐츠 -->
    <div id="stepContent"></div>

    <!-- 네비게이션 -->
    <div class="onb-nav" id="onbNav"></div>
  </div>
</div>

<!-- ── 코호트 메인 (온보딩 완료 후 표시) ──────────── -->
<main class="cohort-main" id="cohortMain" style="display:none">
  <div class="cohort-wrap">

    <!-- 프로필 바 -->
    <div class="cohort-profile" id="cohortProfile"></div>

    <!-- 좌측: 공지/게시판 -->
    <section class="cohort-board" id="cohortBoard"></section>

    <!-- 우측: 실시간 채팅 -->
    <section class="cohort-chat" id="cohortChat">
      <div class="cohort-chat-header">
        <div>
          <div class="cohort-chat-title" id="chatTitle">코호트 실시간 채팅</div>
          <div class="cohort-chat-online" id="chatOnline">0명 활동 중</div>
        </div>
      </div>
      <div class="cohort-chat-messages" id="chatMessages"></div>
      <div class="cohort-chat-input">
        <input type="text" id="chatInput" placeholder="같은 단계 환우들에게 메시지를 보내세요…">
        <button id="chatSend">전송</button>
      </div>
    </section>

  </div>
</main>

<!-- 개별 항목 수정 모달 -->
<div class="cohort-edit-overlay" id="editOverlay">
  <div class="cohort-edit-modal">
    <div class="cohort-edit-title" id="editTitle"></div>
    <div class="cohort-edit-desc" id="editDesc"></div>
    <div class="cohort-edit-options" id="editOptions"></div>
    <div class="cohort-edit-actions">
      <button class="cohort-edit-cancel" id="editCancel">취소</button>
      <button class="cohort-edit-save" id="editSave" disabled>변경 적용</button>
    </div>
  </div>
</div>

<!-- 변경 알림 토스트 -->

    <div class="footer-row">

    </div>

</footer>

    <a href="../cohort" class="active">in 코호트</a>

<script>
// ── GNB scroll ─────────────────────────────
const gnb = document.getElementById('gnb');
window.addEventListener('scroll', () => {
  gnb.classList.toggle('scrolled', window.scrollY > 8);
}, { passive: true });

// ── Mobile drawer ──────────────────────────
const ham = document.getElementById('hamBtn');
const dim = document.getElementById('dim');
const drawer = document.getElementById('drawer');
const closeBtn = document.getElementById('drawerClose');
function openD() { drawer.classList.add('on'); dim.classList.add('on'); document.body.style.overflow = 'hidden'; }
function shutD() { drawer.classList.remove('on'); dim.classList.remove('on'); document.body.style.overflow = ''; }
ham.addEventListener('click', openD);
closeBtn.addEventListener('click', shutD);
dim.addEventListener('click', shutD);

// ============================================================
//   온보딩 5단계
// ============================================================

      '갑상선암': ['유두암','여포암','수질암','미분화암','잘 모르겠어요'],
      '폐암':     ['비소세포(선암)','비소세포(편평)','소세포폐암','잘 모르겠어요'],
      '췌장암':   ['선암','신경내분비','낭성종양','잘 모르겠어요'],
      '전립선암': ['선암','소세포형','이행세포형','잘 모르겠어요'],

    iconClass: 'onb-icon--surgery',

  },

    key: 'regimen',
    icon: '💊',
    iconClass: 'onb-icon--regimen',

      '갑상선암': ['방사성요오드(RAI)','렌바티닙','소라페닙','해당 없음(수술만)','잘 모르겠어요'],

      '전립선암': ['도세탁셀','엔잘루타마이드','아비라테론','ADT(호르몬차단)','해당 없음/잘 모르겠어요'],
      '당뇨':     ['인슐린 치료','경구 혈당강하제','생활습관 관리','복합 요법','해당 없음/잘 모르겠어요'],
      '심혈관':   ['약물 치료(스타틴·항응고제)','스텐트 시술 후','심장 수술 후','심장재활 프로그램','해당 없음/잘 모르겠어요'],
      '알러지':   ['항히스타민제','면역요법(감작치료)','회피 요법','스테로이드 치료','해당 없음/잘 모르겠어요'],
      '소아성장': ['성장호르몬 치료','호르몬 관찰 중','영양·운동 관리','해당 없음/잘 모르겠어요'],
      '공황장애': ['SSRI(항우울제)','인지행동치료(CBT)','벤조디아제핀(단기)','복합 치료','해당 없음/잘 모르겠어요'],
      '우울증':   ['SSRI(항우울제)','SNRI','인지행동치료(CBT)','복합 치료(약물+심리)','해당 없음/잘 모르겠어요'],
    }
  }
];

// 질환 유형에 따라 건너뛸 스텝 결정
function getActiveSteps() {
  const isCancer = selections.disease === '암 질환';
  return STEPS.filter(s => !s.cancerOnly || isCancer);
}

let currentStep = 0;
const selections = {};

function renderOnboarding() {
  const activeSteps = getActiveSteps();
  const stepIndex = Math.min(currentStep, activeSteps.length - 1);
  currentStep = stepIndex;
  const step = activeSteps[stepIndex];

  // 스텝 인디케이터
  document.getElementById('stepDots').innerHTML = activeSteps.map((_, i) => {
    const cls = i < stepIndex ? 'onb-dot done' : (i === stepIndex ? 'onb-dot active' : 'onb-dot');
    return `<div class="${cls}"></div>`;
  }).join('');

  // 옵션 결정
  let options = step.options;
  if (step.optionsByDisease) {
    options = step.optionsByDisease[selections.disease] || ['잘 모르겠어요'];
  } else if (step.optionsByParent) {
    const parentVal = selections.cancer;
    options = step.optionsByParent[parentVal] || ['잘 모르겠어요'];
  }

  // 콘텐츠
  const selected = selections[step.key] || '';
  document.getElementById('stepContent').innerHTML = `
    <div class="onb-icon ${step.iconClass}">${step.icon}</div>
    <h2 class="onb-title">${step.title}</h2>
    <p class="onb-desc">${step.desc}</p>
    <div class="onb-options">
      ${options.map(o => `<button class="onb-opt ${o === selected ? 'selected' : ''}" data-val="${o}">${o}</button>`).join('')}
    </div>
  `;

  // 옵션 클릭 이벤트
  document.querySelectorAll('.onb-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.onb-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selections[step.key] = btn.dataset.val;

      // 질환 유형 변경 시 하위 선택 초기화
      if (step.key === 'disease') {
        delete selections.cancer;
        delete selections.subtype;
        delete selections.stage;
        delete selections.surgery;
        delete selections.regimen;
      }
      // 질환(암종) 변경 시 아형·레지멘 초기화
      if (step.key === 'cancer') {
        delete selections.subtype;
        delete selections.regimen;
      }

      updateNav();
    });
  });

  updateNav();
}

function updateNav() {
  const activeSteps = getActiveSteps();
  const step = activeSteps[currentStep];
  const hasSelection = !!selections[step.key];
  const isFirst = currentStep === 0;
  const isLast = currentStep === activeSteps.length - 1;

  let html = '';
  if (!isFirst) html += `<button class="onb-btn onb-btn--back" id="onbBack">이전</button>`;
  html += `<button class="onb-btn onb-btn--next" id="onbNext" ${!hasSelection ? 'disabled' : ''}>${isLast ? '코호트 입장하기' : '다음'}</button>`;

  document.getElementById('onbNav').innerHTML = html;

  const nextBtn = document.getElementById('onbNext');
  const backBtn = document.getElementById('onbBack');

  nextBtn.addEventListener('click', () => {
    if (!selections[step.key]) return;
    if (isLast) {
      finishOnboarding();
    } else {
      currentStep++;
      renderOnboarding();
    }
  });

  if (backBtn) {
    backBtn.addEventListener('click', () => {
      currentStep--;
      renderOnboarding();
    });
  }
}

function finishOnboarding() {
  const el = document.getElementById('onboarding');
  el.classList.add('done');
  setTimeout(() => { el.style.display = 'none'; }, 300);
  document.getElementById('cohortMain').style.display = '';
  renderCohortMain();
}

// ============================================================
//   코호트 메인 렌더링
// ============================================================
function renderCohortMain() {
  const disease = selections.disease || '';
  const cancer  = selections.cancer  || '';
  const subtype = selections.subtype || '';
  const stage   = selections.stage   || '';
  const surgery = selections.surgery || '';
  const regimen = selections.regimen || '';

  const onlineCount = 8 + Math.floor(Math.random() * 25);

  // 프로필 바 — 각 태그를 개별적으로 수정 가능
  const tagItems = [
    { key:'disease', label: disease },
    { key:'cancer', label: cancer },
    { key:'subtype', label: subtype },
    { key:'stage', label: stage },
    { key:'surgery', label: surgery },
    { key:'regimen', label: regimen.length > 20 ? regimen.slice(0, 18) + '…' : regimen, full: regimen },
  ].filter(t => t.label);

  document.getElementById('cohortProfile').innerHTML = `
    <div class="cohort-profile-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round">
        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 00-3-3.87"/>
        <path d="M16 3.13a4 4 0 010 7.75"/>
      </svg>
    </div>
    <div class="cohort-profile-info">
      <div class="cohort-profile-label">나의 코호트 <span style="font-size:.72rem;color:#9ca3af;font-weight:400">(클릭하여 수정)</span></div>
      <div class="cohort-profile-detail">
        ${tagItems.map(t => `<span class="cohort-tag cohort-tag--editable" data-edit-key="${t.key}" title="${t.full || t.label}">${t.label}</span>`).join('')}
      </div>
    </div>
    <div class="cohort-members">${onlineCount}명 활동 중</div>
    <button class="cohort-change-btn" onclick="resetOnboarding()">처음부터 다시</button>
  `;

  // 개별 태그 클릭 → 인라인 수정 모달
  document.querySelectorAll('.cohort-tag--editable').forEach(tag => {
    tag.addEventListener('click', () => openEditModal(tag.dataset.editKey));
  });

  // 공지 / 게시판
  renderBoard(disease, cancer, subtype, stage, surgery, regimen);

  // 채팅
  renderChat(disease, cancer, subtype, stage, surgery, regimen, onlineCount);
}

function resetOnboarding() {
  Object.keys(selections).forEach(k => delete selections[k]);
  currentStep = 0;
  const el = document.getElementById('onboarding');
  el.style.display = '';
  el.classList.remove('done');
  document.getElementById('cohortMain').style.display = 'none';
  renderOnboarding();
}

// ── 공지/게시판 렌더링 ────────────────────────
function renderBoard(disease, cancer, subtype, stage, surgery, regimen) {
  const isCancer = disease === '암 질환';
  const conditionLabel = isCancer ? `${cancer} ${subtype} ${stage}` : cancer;
  const NOTICES = {

function renderNotice(n) {
  const badgeMap = {
    pin:  'notice-badge--pin',
    info: 'notice-badge--info',
    tip:  'notice-badge--tip',
    ai:   'notice-badge--ai',
  };

  const pinnedClass = n.pin ? 'notice-card--pinned' : '';
  const authorClass = n.ai ? 'notice-author--ai' : '';

  return `
    <div class="notice-card ${pinnedClass}">
      <div class="notice-top">
        <span class="notice-badge ${badgeMap[n.badge] || 'notice-badge--info'}">${badgeLabel[n.badge] || '정보'}</span>
        <span class="notice-author ${authorClass}">${n.author}</span>
      </div>
      <div class="notice-title">${n.title}</div>
      <div class="notice-excerpt">${n.excerpt}</div>
      <div class="notice-meta">
        <span>👁 ${n.views || 0}</span>
        <span>💬 ${n.comments || 0}</span>
      </div>
    </div>
  `;
}

function renderChatMsg(m) {
  const isAgent = !!m.agent;
  const isMine  = !!m.mine;
  const avatarClass = isAgent ? 'chat-msg-avatar--agent' : '';
  const msgClass    = isMine ? 'chat-msg--mine' : (isAgent ? 'chat-msg--agent' : '');
  return `
    <div class="chat-msg ${msgClass}">
      ${!isMine ? `<div class="chat-msg-avatar ${avatarClass}">${isAgent ? 'AI' : m.u[0]}</div>` : ''}
      <div class="chat-msg-body">
        <div class="chat-msg-name">${isMine ? '나' : m.u}</div>
        <div class="chat-msg-bubble">${m.t}</div>
        <div class="chat-msg-time">${m.ts}</div>
      </div>
    </div>`;
}

function showTyping() {

  el.className = 'chat-msg chat-msg--agent';
  el.id = 'cohortTyping';
  el.innerHTML = `
    <div class="chat-msg-avatar chat-msg-avatar--agent">AI</div>
    <div class="chat-msg-body">
      <div class="chat-msg-name">v.care AI</div>
      <div class="chat-typing"><span></span><span></span><span></span></div>
    </div>`;
  document.getElementById('chatMessages').appendChild(el);
  document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
}

function hideTypingAndRespond(text) {
  const el = document.getElementById('cohortTyping');
  if (el) el.remove();
  const now = new Date();
  const ts = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
  const response = getCohortAIResponse(text);
  const chatEl = document.getElementById('chatMessages');
  chatEl.insertAdjacentHTML('beforeend', renderChatMsg({ u:'v.care AI', t: response, ts, agent:true }));
  chatEl.scrollTop = chatEl.scrollHeight;
}

    { kw:['불안','걱정','두려','무서','힘들','지쳐'], res:'치료 과정에서 불안과 두려움을 느끼는 것은 매우 자연스러운 반응이에요. 혼자 감당하지 마시고, 같은 코호트 환우분들이나 전문 심리 상담을 통해 마음의 짐을 나눠보세요. 여기 있는 분들 모두 함께하고 있습니다.' },
    { kw:['운동','걷기','활동','체력'], res:'치료 중에도 가벼운 운동은 회복에 도움이 됩니다. 주치의와 상의 후, 하루 15~30분 가벼운 걷기부터 시작해 보세요. 무리하지 않는 것이 중요하며, 피로감이 심한 날은 쉬어도 괜찮아요.' },
    { kw:['검사','수치','결과','혈액'], res:'혈액검사 수치는 치료 반응을 모니터링하는 중요한 지표입니다. 일시적인 변동에 너무 걱정하기보다는, 전체적인 추세를 주치의와 함께 확인하시는 것이 좋습니다. 백혈구가 낮을 때는 감염 예방에 특히 주의하세요.' },
    { kw:['축하','완주','완치','마지막'], res:'정말 대단하세요! 긴 치료 여정을 이겨내신 것을 진심으로 축하드립니다. 이후에는 정기적인 추적 검사를 통해 건강을 잘 관리하시길 응원합니다. 같은 코호트 환우분들에게도 큰 희망이 됩니다!' },
  ];

  for (const item of responses) {
    if (item.kw.some(k => text.includes(k))) return item.res;
  }
  return `같은 코호트 환우분들의 경험을 나눠주셔서 감사합니다. ${cancer} 치료 과정에서 궁금한 점이 있으시면 언제든 질문해 주세요. 담당 의료팀과의 적극적인 소통도 잊지 마세요!`;
}

function sendCohortMsg() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  const now = new Date();
  const ts = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
  const chatEl = document.getElementById('chatMessages');
  chatEl.insertAdjacentHTML('beforeend', renderChatMsg({ u:'나', t: text, ts, mine:true }));
  chatEl.scrollTop = chatEl.scrollHeight;
  input.value = '';

  // AI 에이전트 개입 (타이핑 인디케이터 후 1.6~2.2초 딜레이)
  const delay = 1600 + Math.random() * 600;
  setTimeout(showTyping, 400);
  setTimeout(() => hideTypingAndRespond(text), delay);
}

document.getElementById('chatSend').addEventListener('click', sendCohortMsg);
document.getElementById('chatInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendCohortMsg(); });

// ── 개별 항목 수정 모달 ────────────────────────
let editingKey = null;
let editTempVal = null;

const EDIT_META = {
  disease: { title: '질환 유형 변경', desc: '질환 유형을 변경하면 하위 항목이 모두 초기화됩니다.', resetsAll: true },
  cancer:  { title: '질환 변경', desc: '질환을 변경하면 아형·레지멘이 초기화됩니다.', resets: ['subtype','regimen'] },
  subtype: { title: '아형(Subtype) 변경', desc: '세부 아형을 변경합니다.' },
  stage:   { title: '병기(Stage) 변경', desc: '현재 병기를 변경합니다.' },
  surgery: { title: '수술 전/후 변경', desc: '수술 시점을 변경합니다.' },
  regimen: { title: '치료 레지멘 변경', desc: '현재 치료 레지멘을 변경합니다.' },
};

function getOptionsForKey(key) {
  const step = STEPS.find(s => s.key === key);
  if (!step) return [];
  if (step.optionsByDisease) return step.optionsByDisease[selections.disease] || [];
  if (step.optionsByParent) return step.optionsByParent[selections.cancer] || [];
  return step.options || [];
}

function openEditModal(key) {
  editingKey = key;
  editTempVal = selections[key] || null;
  const meta = EDIT_META[key];
  const options = getOptionsForKey(key);

  document.getElementById('editTitle').textContent = meta.title;
  document.getElementById('editDesc').textContent = meta.desc;

  document.getElementById('editOptions').innerHTML = options.map(o =>
    `<button class="cohort-edit-opt ${o === editTempVal ? 'selected' : ''}" data-val="${o}">${o}</button>`
  ).join('');

  document.getElementById('editSave').disabled = !editTempVal;

  // 옵션 클릭
  document.querySelectorAll('.cohort-edit-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cohort-edit-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      editTempVal = btn.dataset.val;
      document.getElementById('editSave').disabled = false;
    });
  });

  document.getElementById('editOverlay').classList.add('on');
}

function closeEditModal() {
  document.getElementById('editOverlay').classList.remove('on');
  editingKey = null;
  editTempVal = null;
}

function showToast(msg) {
  const toast = document.getElementById('cohortToast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

document.getElementById('editCancel').addEventListener('click', closeEditModal);
document.getElementById('editOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('editOverlay')) closeEditModal();
});

document.getElementById('editSave').addEventListener('click', () => {
  if (!editingKey || !editTempVal) return;
  const meta = EDIT_META[editingKey];
  const oldVal = selections[editingKey];
  selections[editingKey] = editTempVal;

  // 상위 항목 변경 시 하위 초기화
  if (meta.resetsAll) {
    delete selections.cancer;
    delete selections.subtype;
    delete selections.stage;
    delete selections.surgery;
    delete selections.regimen;
    // 질환 유형이 바뀌면 전체 온보딩 재시작
    closeEditModal();
    resetOnboarding();
    return;
  }
  if (meta.resets) {
    meta.resets.forEach(k => delete selections[k]);
  }

  closeEditModal();

  // 하위 항목이 초기화된 경우 → 누락된 항목을 순차적으로 채우도록 안내
  const missing = getMissingSelections();
  if (missing) {
    openEditModal(missing);
    showToast(`${EDIT_META[editingKey].title.replace(' 변경','')} → ${editTempVal} (으)로 변경됨. 연관 항목을 다시 선택해 주세요.`);
  } else {
    showToast(`${EDIT_META[editingKey].title.replace(' 변경','')}이(가) "${editTempVal}"(으)로 변경되었습니다.`);
    renderCohortMain();
  }
});

function getMissingSelections() {
  const activeSteps = getActiveSteps();
  for (const step of activeSteps) {
    if (!selections[step.key]) return step.key;
  }
  return null;
}

// ── 초기화 ────────────────────────────────────
renderOnboarding();
</script>
