<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기록/응원 남기기 — v.care</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="write.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
</head>
<body>

<!-- GNB -->
<header class="gnb" id="gnb">
  <div class="gnb-inner">
    <a href="index.html" class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="9" r="5.5" stroke="#111827" stroke-width="1.6"/>
        <path d="M7 17.5c0-2.76 2.24-5 5-5s5 2.24 5 5" stroke="#111827" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <span class="logo-text">v.care</span>
    </a>
    <nav class="gnb-nav">
      <ul>
        <li><a href="index.html">홈</a></li>
        <li><a href="feed.html">피드</a></li>
        <li><a href="community.html">질환별 게시판</a></li>
        <li><a href="#">검사결과지</a></li>
        <li><a href="#">문의</a></li>
      </ul>
    </nav>
    <div class="gnb-right">
      <a href="#" class="btn-login">로그인</a>
      <button class="hamburger" id="hamBtn" aria-label="메뉴">
        <span></span><span></span>
      </button>
    </div>
  </div>
</header>

<!-- 히어로 -->
<section class="page-hero page-hero--write">
  <div class="hero-blob"></div>
  <div class="arc arc-a"></div>
  <div class="arc arc-b"></div>
  <div class="hero-body">
    <p class="eyebrow">Share Your Story.</p>
    <h1 class="hero-title hero-title--write">
      <em>기록</em> / <em>응원 남기기</em>
    </h1>
    <p class="hero-desc">
      당신의 경험이 누군가의 희망이 됩니다.<br>
      편하게 기록하고, 함께 나눠주세요.
    </p>
  </div>
</section>

<!-- 메인 -->
<main class="write-main">
  <div class="write-layout">

    <!-- 왼쪽: 작성 폼 -->
    <div class="write-form-area">

      <!-- Step 1: 질환 선택 -->
      <div class="write-section">
        <label class="write-label">질환 선택</label>
        <div class="write-select-group" id="diseaseGroup">
          <button class="ws-btn" data-value="breast">유방암</button>
          <button class="ws-btn" data-value="stomach">위암</button>
          <button class="ws-btn" data-value="colon">대장암</button>
          <button class="ws-btn" data-value="liver">간암</button>
          <button class="ws-btn" data-value="thyroid">갑상선암</button>
          <button class="ws-btn" data-value="lung">폐암</button>
          <button class="ws-btn" data-value="allergy">알러지</button>
          <button class="ws-btn" data-value="diabetes">당뇨</button>
          <button class="ws-btn" data-value="cardio">심혈관</button>
          <button class="ws-btn" data-value="pediatric">소아성장</button>
          <button class="ws-btn" data-value="pancreas">췌장암</button>
          <button class="ws-btn" data-value="prostate">전립선암</button>
        </div>
      </div>

      <!-- Step 2: 게시글 종류 -->
      <div class="write-section">
        <label class="write-label">게시글 종류</label>
        <div class="write-select-group" id="catGroup">
          <button class="ws-btn ws-btn--symptom" data-value="symptom">증상 질문</button>
          <button class="ws-btn ws-btn--case" data-value="case">희망 사례</button>
          <button class="ws-btn ws-btn--cheer" data-value="cheer">따뜻한 응원</button>
          <button class="ws-btn ws-btn--news" data-value="news">최신정보</button>
        </div>
      </div>

      <!-- Step 3: 치료 단계 -->
      <div class="write-section">
        <label class="write-label">치료 단계</label>
        <div class="write-select-group" id="stageGroup">
          <button class="ws-btn" data-value="pre">진단/검사 중</button>
          <button class="ws-btn" data-value="surgery">수술 전후</button>
          <button class="ws-btn" data-value="chemo">항암 치료 중</button>
          <button class="ws-btn" data-value="radiation">방사선 치료 중</button>
          <button class="ws-btn" data-value="hormone">호르몬/표적 치료 중</button>
          <button class="ws-btn" data-value="recovery">치료 완료/회복 중</button>
          <button class="ws-btn" data-value="followup">추적 관찰 중</button>
          <button class="ws-btn" data-value="caregiver">보호자</button>
        </div>
      </div>

      <!-- Step 4: 제목 + 자동 해시태그 -->
      <div class="write-section">
        <label class="write-label">제목</label>
        <div class="write-title-wrap">
          <input type="text" class="write-input" id="writeTitle" placeholder="제목을 입력하세요 (예: HER2 양성 유방암 항암 후기)">
          <div class="write-tags-auto" id="autoTags"></div>
        </div>
      </div>

      <!-- Step 5: 상세내용 -->
      <div class="write-section">
        <label class="write-label">상세내용</label>
        <textarea class="write-textarea" id="writeContent" rows="10" placeholder="경험, 질문, 응원의 말씀을 자유롭게 작성해주세요.&#10;&#10;작성 팁:&#10;· 어떤 증상이 있었는지&#10;· 어떤 치료를 받았는지&#10;· 도움이 된 것은 무엇이었는지"></textarea>
      </div>

      <!-- Step 5.5: URL 입력 (최신정보 카테고리 전용) -->
      <div class="write-section" id="urlSection" style="display:none">
        <label class="write-label">참고 링크 <span class="write-label-sub">(논문, 뉴스, 임상시험 URL)</span></label>
        <input type="url" class="write-input" id="writeUrl" placeholder="https://example.com/article">
        <div class="url-write-preview" id="urlPreview" style="display:none"></div>
      </div>

      <!-- Step 6: 이미지 업로드 -->
      <div class="write-section">
        <label class="write-label">이미지 첨부 <span class="write-label-sub">(최대 5장)</span></label>
        <div class="write-img-area">
          <div class="write-img-list" id="imgList"></div>
          <label class="write-img-add" id="imgAddBtn">
            <input type="file" accept="image/*" multiple hidden id="imgInput">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            <span>사진 추가</span>
          </label>
        </div>
      </div>

      <!-- 제출 -->
      <div class="write-actions">
        <a href="community.html" class="write-btn-cancel">취소</a>
        <button class="write-btn-submit" id="submitBtn">게시하기</button>
      </div>

    </div>

    <!-- 오른쪽: AI 작성 도우미 -->
    <aside class="write-ai-panel" id="aiPanel">
      <div class="ai-panel-header">
        <div class="ai-panel-avatar">AI</div>
        <div class="ai-panel-title">v.care AI 작성 도우미</div>
      </div>
      <div class="ai-panel-messages" id="aiMessages">
        <div class="ai-panel-msg">
          안녕하세요! 글 작성을 도와드릴게요. 😊<br><br>
          먼저 <b>질환을 선택</b>해 주세요. 선택하신 질환에 맞는 작성 가이드를 안내해 드릴게요.
        </div>
      </div>
    </aside>

  </div>
</main>

<!-- Footer -->
<footer class="footer">
  <div class="container">
    <div class="footer-row">
      <span class="footer-brand">v.care by aitrics</span>
      <span class="footer-copy">&copy; 2026 aitrics. All rights reserved.</span>
    </div>
  </div>
</footer>

  // ── AI 메시지 추가 함수 ──────────────────
  function addAiMsg(html) {
    const div = document.createElement('div');
    div.className = 'ai-panel-msg ai-panel-msg--new';
    div.innerHTML = html;
    aiMsgs.appendChild(div);
    aiMsgs.scrollTop = aiMsgs.scrollHeight;
  }

  // ── 선택 버튼 공통 로직 ──────────────────
  function setupSelectGroup(groupId, onSelect) {
    const group = document.getElementById(groupId);
    group.querySelectorAll('.ws-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        group.querySelectorAll('.ws-btn').forEach(b => b.classList.remove('ws-btn--active'));
        btn.classList.add('ws-btn--active');
        onSelect(btn.dataset.value);
      });
    });
  }

  // Step 1: 질환 선택
  setupSelectGroup('diseaseGroup', val => {
    selectedDisease = val;
    addAiMsg(AI_GUIDES.disease[val]);
  });

  // Step 2: 게시글 종류
  setupSelectGroup('catGroup', val => {
    selectedCat = val;
    addAiMsg(AI_GUIDES.cat[val]);
    document.getElementById('urlSection').style.display = val === 'news' ? '' : 'none';
  });

  // Step 3: 치료 단계
  setupSelectGroup('stageGroup', val => {
    selectedStage = val;
    addAiMsg(AI_GUIDES.stage);
  });

  // Step 4: 제목 입력 → 자동 해시태그
  const writeTitle = document.getElementById('writeTitle');
  const autoTags = document.getElementById('autoTags');
  let titleGuideShown = false;

  writeTitle.addEventListener('input', () => {
    const text = writeTitle.value.toLowerCase();
    const matched = new Set();
    for (const [kw, tags] of Object.entries(TAG_MAP)) {
      if (text.includes(kw.toLowerCase())) {
        tags.forEach(t => matched.add(t));
      }
    }
    if (matched.size > 0) {
      autoTags.innerHTML = [...matched].map(t => `<span class="auto-tag">${t}</span>`).join('');
      autoTags.style.display = 'flex';
    } else {
      autoTags.style.display = 'none';
      autoTags.innerHTML = '';
    }

    if (text.length > 5 && !titleGuideShown) {
      titleGuideShown = true;
      addAiMsg(AI_GUIDES.title);
    }
  });

  // Step 5: 상세내용 → 개인정보 감지
  const writeContent = document.getElementById('writeContent');
  let contentGuideShown = false;
  let lastMaskedTypes = new Set();

  writeContent.addEventListener('input', () => {
    if (writeContent.value.length > 20 && !contentGuideShown) {
      contentGuideShown = true;
      addAiMsg(AI_GUIDES.content);
    }
  });

  writeContent.addEventListener('blur', () => {
    let text = writeContent.value;
    let detected = [];
    MASK_PATTERNS.forEach(p => {
      if (p.regex.test(text)) {
        detected.push(p.label);
        text = text.replace(p.regex, p.mask);
      }
      p.regex.lastIndex = 0;
    });
    if (detected.length > 0) {
      const newTypes = detected.filter(t => !lastMaskedTypes.has(t));
      if (newTypes.length > 0) {
        writeContent.value = text;
        newTypes.forEach(t => lastMaskedTypes.add(t));
        addAiMsg(AI_GUIDES.privacy.replace('{type}', detected.join(', ')));
      }
    }
  });

  // Step 6: 이미지 업로드
  const imgInput = document.getElementById('imgInput');
  const imgList = document.getElementById('imgList');
  const imgAddBtn = document.getElementById('imgAddBtn');

  imgInput.addEventListener('change', () => {
    const files = Array.from(imgInput.files);
    const remaining = MAX_IMAGES - uploadedImages.length;
    const toAdd = files.slice(0, remaining);

    toAdd.forEach(file => {
      uploadedImages.push(file);
      const reader = new FileReader();
      reader.onload = e => {
        const idx = uploadedImages.indexOf(file);
        const item = document.createElement('div');
        item.className = 'write-img-item';
        item.innerHTML = `
          <img src="${e.target.result}" alt="업로드 이미지">
          <button class="write-img-remove" data-idx="${idx}">&times;</button>`;
        imgList.appendChild(item);
        updateImgUI();
      };
      reader.readAsDataURL(file);
    });
    imgInput.value = '';
  });

  imgList.addEventListener('click', e => {
    if (e.target.classList.contains('write-img-remove')) {
      const idx = parseInt(e.target.dataset.idx);
      uploadedImages.splice(idx, 1);
      renderImages();
    }
  });

  function renderImages() {
    imgList.innerHTML = '';
    uploadedImages.forEach((file, idx) => {
      const reader = new FileReader();
      reader.onload = e => {
        const item = document.createElement('div');
        item.className = 'write-img-item';
        item.innerHTML = `
          <img src="${e.target.result}" alt="업로드 이미지">
          <button class="write-img-remove" data-idx="${idx}">&times;</button>`;
        imgList.appendChild(item);
      };
      reader.readAsDataURL(file);
    });
    updateImgUI();
  }

  function updateImgUI() {
    imgAddBtn.style.display = uploadedImages.length >= MAX_IMAGES ? 'none' : 'flex';
  }

  // URL 미리보기 (최신정보) — OG 카드 스타일
  const writeUrl = document.getElementById('writeUrl');
  const urlPreview = document.getElementById('urlPreview');
  const URL_SITES = {
    'fda.gov':            {name:'U.S. Food & Drug Administration', logo:'FDA',  gradient:'linear-gradient(135deg,#1a5276,#2980b9)'},
    'nejm.org':           {name:'New England Journal of Medicine', logo:'NEJM', gradient:'linear-gradient(135deg,#b71c1c,#e53935)'},
    'thelancet.com':      {name:'The Lancet Oncology',             logo:'TL',   gradient:'linear-gradient(135deg,#01579b,#0288d1)'},
    'clinicaltrials.gov': {name:'ClinicalTrials.gov',              logo:'CT',   gradient:'linear-gradient(135deg,#2e7d32,#43a047)'},
    'asco.org':           {name:'ASCO Annual Meeting',             logo:'ASCO', gradient:'linear-gradient(135deg,#00695c,#00897b)'},
    'hira.or.kr':         {name:'건강보험심사평가원',                 logo:'HIRA', gradient:'linear-gradient(135deg,#1565c0,#1e88e5)'},
    'cancer.gov':         {name:'National Cancer Institute',       logo:'NCI',  gradient:'linear-gradient(135deg,#1b5e20,#388e3c)'},
    'pubmed.ncbi':        {name:'PubMed',                          logo:'PM',   gradient:'linear-gradient(135deg,#326599,#4a90c4)'},
  };
  writeUrl.addEventListener('input', () => {
    const val = writeUrl.value.trim();
    if (!val) { urlPreview.style.display = 'none'; return; }
    try {
      const domain = new URL(val).hostname.replace('www.','');
      const info = Object.entries(URL_SITES).find(([k]) => domain.includes(k));
      const site = info ? info[1] : {name:domain, logo:domain.slice(0,3).toUpperCase(), gradient:'linear-gradient(135deg,#6b7280,#9ca3af)'};
      const linkSvg = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>`;
      urlPreview.innerHTML = `
        <div class="url-preview-card" style="margin-top:10px;margin-bottom:0">
          <div class="url-preview-thumb" style="background:${site.gradient}">
            <div class="url-preview-thumb-logo">${site.logo}</div>
            <div class="url-preview-thumb-domain">${domain}</div>
          </div>
          <div class="url-preview-body">
            <div class="url-preview-site">${site.name}</div>
            <div class="url-preview-url">${linkSvg} ${val}</div>
          </div>
        </div>`;
      urlPreview.style.display = '';
    } catch(e) { urlPreview.style.display = 'none'; }
  });

  // 게시하기
  document.getElementById('submitBtn').addEventListener('click', () => {
    if (!selectedDisease) { addAiMsg('질환을 먼저 선택해 주세요.'); return; }
    if (!selectedCat) { addAiMsg('게시글 종류를 선택해 주세요.'); return; }
    if (!selectedStage) { addAiMsg('치료 단계를 선택해 주세요.'); return; }
    if (!writeTitle.value.trim()) { addAiMsg('제목을 입력해 주세요.'); return; }
    if (!writeContent.value.trim()) { addAiMsg('상세내용을 입력해 주세요.'); return; }

    addAiMsg(AI_GUIDES.ready);
    setTimeout(() => {
      alert('게시글이 성공적으로 등록되었습니다!');
      window.location.href = 'community.html';
    }, 1200);
  });

  // ── 모바일 햄버거 ────────────────────────
  const hamBtn = document.getElementById('hamBtn');
  if (hamBtn) {
    hamBtn.addEventListener('click', () => {
      document.body.classList.toggle('drawer-open');
    });
  }
</script>
</body>
</html>
