          </div>
        `).join('')}
      </div>
    </div>
  `;

  // ── AI 유사글 추천 ─────────────────────────
  function findSimilar(post) {
    return ALL_POSTS.filter(p =>
      p.id !== post.id && (p.disease === post.disease || p.cat === post.cat)
    ).sort((a,b) => {
      const scoreA = (a.disease === post.disease ? 2 : 0) + (a.cat === post.cat ? 1 : 0);
      const scoreB = (b.disease === post.disease ? 2 : 0) + (b.cat === post.cat ? 1 : 0);
      return scoreB - scoreA;
    }).slice(0, 3);
  }

  const similar = findSimilar(post);
  document.getElementById('aiSimilar').innerHTML = `
    <div class="ai-similar-intro">
      ${verifiedBadgeHtml}
      <p style="margin-top:6px">이 글과 비슷한 경험을 공유한 게시글을 찾았어요. 함께 읽어보시면 도움이 될 수 있습니다.</p>
    </div>
    ${similar.map(s => `
      <a href="../post?id=${s.id}" class="ai-similar-card">
        <div class="ai-similar-badge-row">
          <span class="post-badge ${s.badgeClass}" style="font-size:.65rem;padding:2px 7px;">${s.catLabel}</span>
          <span class="ai-similar-disease">${s.diseaseLabel}</span>
        </div>
        <div class="ai-similar-title">${s.title}</div>
        <div class="ai-similar-excerpt">${s.excerpt}</div>
        <div class="ai-similar-meta">${s.author} · 조회 ${s.views}</div>
      </a>
    `).join('')}
  `;

  // ── 인터랙션 ──────────────────────────────
  // 좋아요
  document.getElementById('likeBtn').addEventListener('click', function() {
    this.classList.toggle('pd-like-btn--active');
    const cnt = document.getElementById('likeCount');
    const active = this.classList.contains('pd-like-btn--active');
    cnt.textContent = parseInt(cnt.textContent) + (active ? 1 : -1);
  });

  // 응원해요
  document.getElementById('cheerBtn').addEventListener('click', function() {
    this.classList.toggle('pd-reaction--active');
    const cnt = document.getElementById('cheerCount');
    const active = this.classList.contains('pd-reaction--active');
    cnt.textContent = parseInt(cnt.textContent) + (active ? 1 : -1);
  });

  // 유익해요
  document.getElementById('usefulBtn').addEventListener('click', function() {
    this.classList.toggle('pd-reaction--active');
    const cnt = document.getElementById('usefulCount');
    const active = this.classList.contains('pd-reaction--active');
    cnt.textContent = parseInt(cnt.textContent) + (active ? 1 : -1);
  });

  // 댓글 작성
  function getLoginRole() {
    try {
      var saved = localStorage.getItem('oncocare_login');
      if (saved) { var p = JSON.parse(saved); return p && p.role ? p.role : '환자'; }
    } catch(e) {}
    return '환자';
  }

  document.getElementById('commentBtn').addEventListener('click', () => {
    const input = document.getElementById('commentInput');
    const text = input.value.trim();
    if (!text) return;
    const now = new Date();
    const ts = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
    const role = getLoginRole();
    const isDoc = role === '의료진';
    const html = `
      <div class="comment-item comment-item--new${isDoc ? ' comment-item--doctor' : ''}">
        <div class="comment-avatar${isDoc ? ' comment-avatar--doctor' : ''}">${isDoc ? '🩺' : '나'}</div>
        <div class="comment-body">
          <div class="comment-meta">
            <span class="comment-author ${isDoc ? 'comment-author--doctor' : ''}">${isDoc ? '의료진 답변' : '나'}</span>
            <span class="comment-role ${isDoc ? 'comment-role--doctor' : ''}">${role}</span>
            <span class="comment-date">${ts}</span>
          </div>
          <p class="comment-text">${text}</p>
          <button class="comment-like">${HEART_SVG} <span>0</span></button>
        </div>
      </div>`;
    document.getElementById('commentList').insertAdjacentHTML('afterbegin', html);
    input.value = '';
    // 댓글 수 업데이트
    const titleEl = document.querySelector('.comments-title strong');
    titleEl.textContent = parseInt(titleEl.textContent) + 1;
  });

  // 수정/삭제 (데모)
  document.querySelector('.pd-btn--edit')?.addEventListener('click', () => {
    window.location.href = '../write';
  });
  document.querySelector('.pd-btn--delete')?.addEventListener('click', () => {
    if (confirm('정말 삭제하시겠습니까?')) {
      alert('게시글이 삭제되었습니다.');
      window.location.href = '../community';
    }
  });

  // 댓글 좋아요
  document.addEventListener('click', e => {
    const btn = e.target.closest('.comment-like');
    if (!btn) return;
    btn.classList.toggle('comment-like--active');
    const span = btn.querySelector('span');
    const active = btn.classList.contains('comment-like--active');
    span.textContent = parseInt(span.textContent) + (active ? 1 : -1);
  });

  // 햄버거
  const hamBtn = document.getElementById('hamBtn');
  if(hamBtn) hamBtn.addEventListener('click',()=>document.body.classList.toggle('drawer-open'));

  // 의료진 모드 — 댓글 입력 placeholder 변경
  function applyPostDoctorMode(isDoctor) {
    var ci = document.getElementById('commentInput');
    if (ci) ci.placeholder = isDoctor ? '전문 의료 지식을 바탕으로 답변해 주세요.' : '경험이나 응원의 말씀을 남겨주세요.';
  }
  window.addEventListener('oncocare-login', function(e) {
    if (e.detail) applyPostDoctorMode(e.detail.role === '의료진');
  });
  window.addEventListener('oncocare-logout', function() { applyPostDoctorMode(false); });
  (function() {
    try {
      var s = localStorage.getItem('oncocare_login');
      if (s) { var p = JSON.parse(s); if (p && p.role === '의료진') applyPostDoctorMode(true); }
    } catch(e) {}
  })();

  } // end else (isNotice)
</script>
<script src="../login.js"></script>
</body>
</html>
